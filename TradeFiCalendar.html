<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Chronicle — 宏观事件编年史</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface-hover: #1a1a25;
  --border: #1e1e2e; --border-active: #2a2a3e;
  --text: #e0e0e8; --text-muted: #6b6b80; --text-dim: #44445a;
  --accent: #f59e0b; --accent-dim: #78500d;
  --asia: #22d3ee; --asia-dim: #0e4f5a;
  --us: #a78bfa; --us-dim: #3b2d6e;
  --crypto: #34d399; --crypto-dim: #0f4a33;
  --danger: #ef4444; --danger-dim: #5c1a1a;
  --warning: #f59e0b;
  --ongoing: #fb923c; --ongoing-dim: #5c3a12;
}
* { margin:0; padding:0; box-sizing:border-box; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
html, body, #root { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; }

.app { max-width: 1400px; margin: 0 auto; padding: 16px 20px; min-height: 100vh; }

/* Header */
.header {
    display: grid;
    /* 分成三栏：左边自动、中间占满、右边自动 */
    grid-template-columns: 1fr auto 1fr; 
    align-items: center;
    padding: 15px 20px;
    background-color: #0d1117;
    border-bottom: 1px solid #30363d;
}

/* 强制标题组垂直堆叠并水平居中 */
.header-title-group {
    grid-column: 2; /* 明确指定在中间那一栏 */
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.header h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: #ff9f1c; /* 橙黄色 */
}

.header .sub {
    font-size: 0.85rem;
    color: #8b949e;
    margin-top: 4px;
}

/* 右侧按钮组 */
.header-actions {
    grid-column: 3;
    justify-self: end; /* 靠右对齐 */
    display: flex;
    gap: 10px;
}
.header-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; font-family: 'JetBrains Mono'; transition: all .2s; }
.header-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Stats */
.stats-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.stat-card { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-width: 80px; }
.stat-num { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Nav */
.nav { display: flex; gap: 2px; margin-bottom: 14px; background: var(--surface); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
.nav-btn { flex: 1; padding: 10px 16px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-family: 'Noto Sans SC'; cursor: pointer; border-radius: 6px; transition: all .2s; font-weight: 500; }
.nav-btn:hover { color: var(--text); background: var(--surface-hover); }
.nav-btn.active { background: var(--border-active); color: var(--accent); }

/* Filters */
.track-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.track-chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid; transition: all .2s; font-weight: 500; user-select: none; }
.track-chip.off { opacity: .35; }
.search-input { flex: 1; min-width: 120px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'Noto Sans SC'; outline: none; transition: border-color .2s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }
.add-btn { padding: 7px 18px; border-radius: 6px; border: 1px dashed var(--border-active); background: transparent; color: var(--accent); font-size: 12px; cursor: pointer; font-family: 'Noto Sans SC'; transition: all .2s; white-space: nowrap; }
.add-btn:hover { background: var(--accent-dim); border-style: solid; }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 1px; background: var(--border); }
.tl-item { position: relative; margin-bottom: 14px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; transition: all .2s; cursor: pointer; }
.tl-item:hover { border-color: var(--border-active); transform: translateX(4px); }
.tl-dot { position: absolute; left: -21px; top: 20px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid; background: var(--bg); }
.tl-date { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.tl-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.tl-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.tl-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
.tl-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.tl-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface-hover); color: var(--text-muted); border: 1px solid var(--border); }
.badge { font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
.coin-badge { font-family: 'JetBrains Mono'; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--crypto-dim); color: var(--crypto); font-weight: 600; }
.importance-dots { position: absolute; right: 14px; top: 14px; display: flex; gap: 3px; }
.importance-dots span { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.tl-actions { position: absolute; right: 14px; bottom: 12px; display: flex; gap: 6px; opacity: 0; transition: opacity .2s; }
.tl-item:hover .tl-actions { opacity: 1; }
.act-btn { padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 10px; cursor: pointer; font-family: 'Noto Sans SC'; transition: all .15s; }
.act-btn:hover { color: var(--text); border-color: var(--border-active); }
.act-btn.del:hover { color: var(--danger); border-color: var(--danger); }

/* Swipe to delete */
.swipe-wrapper { position: relative; overflow: hidden; border-radius: 8px; margin-bottom: 14px; }
.swipe-content { position: relative; z-index: 2; transition: transform .25s ease; touch-action: pan-y; }
.swipe-content.dragging { transition: none; }
.swipe-behind { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; display: flex; align-items: center; justify-content: center; background: var(--danger); color: #fff; font-size: 13px; font-weight: 600; font-family: 'Noto Sans SC'; z-index: 1; border-radius: 0 8px 8px 0; cursor: pointer; user-select: none; }
.swipe-behind:active { background: #dc2626; }

/* Ongoing */
.ongoing-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; overflow: hidden; transition: all .2s; }
.ongoing-card:hover { border-color: var(--border-active); }
.ongoing-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; flex-wrap: wrap; }
.ongoing-status { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
.ongoing-title { font-size: 15px; font-weight: 600; flex: 1; min-width: 100px; }
.ongoing-count { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-muted); }
.ongoing-chevron { color: var(--text-muted); font-size: 12px; transition: transform .2s; }
.ongoing-chevron.open { transform: rotate(90deg); }
.ongoing-body { padding: 0 18px 14px; }
.ongoing-update { position: relative; padding: 8px 0 8px 22px; border-left: 1px solid var(--border); margin-left: 5px; }
.ongoing-update::before { content: ''; position: absolute; left: -3.5px; top: 14px; width: 7px; height: 7px; border-radius: 50%; background: var(--border-active); }
.ongoing-update:last-child::before { background: var(--ongoing); }
.ou-date { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); }
.ou-text { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
.ou-add { margin: 10px 0 0 26px; display: flex; gap: 8px; }
.ou-add input { flex: 1; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; font-family: 'Noto Sans SC'; outline: none; }
.ou-add input:focus { border-color: var(--accent); }
.ou-add button { padding: 6px 14px; border-radius: 6px; border: none; background: var(--accent-dim); color: var(--accent); font-size: 11px; cursor: pointer; font-family: 'Noto Sans SC'; }
.ongoing-footer { display: flex; gap: 6px; margin-top: 12px; justify-content: flex-end; }

/* Future */
.future-item { display: flex; align-items: stretch; gap: 14px; margin-bottom: 10px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; transition: all .2s; cursor: pointer; position: relative; }
.future-item:hover { border-color: var(--border-active); transform: translateX(4px); }
.future-countdown { font-family: 'JetBrains Mono'; font-size: 22px; font-weight: 700; min-width: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.future-countdown .unit { font-size: 9px; font-weight: 400; color: var(--text-muted); }
.future-divider { width: 1px; background: var(--border); flex-shrink: 0; }
.future-content { flex: 1; min-width: 0; }
.future-actions { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; gap: 6px; opacity: 0; transition: opacity .2s; }
.future-item:hover .future-actions { opacity: 1; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.modal { background: var(--surface); border: 1px solid var(--border-active); border-radius: 12px; padding: 24px; width: 92%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent); }
.modal label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal textarea, .modal select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-family: 'Noto Sans SC'; outline: none; }
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { min-height: 60px; resize: vertical; }
.modal select { cursor: pointer; }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.modal-tag { padding: 4px 12px; border-radius: 14px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all .15s; }
.modal-tag.sel { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.modal-btns button { padding: 8px 24px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: 'Noto Sans SC'; font-weight: 500; }
.btn-cancel { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border) !important; }
.btn-save { background: var(--accent); color: var(--bg); }
.btn-save:hover { filter: brightness(1.1); }
.importance-sel { display: flex; gap: 8px; margin-top: 6px; }
.imp-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .15s; color: var(--text-dim); }
.imp-dot.sel { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
.empty .icon { font-size: 36px; margin-bottom: 12px; }

/* Year divider */
.year-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 14px; padding-left: 0; }
.year-divider .year-label { font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 700; color: var(--accent); background: var(--bg); padding: 2px 0; white-space: nowrap; letter-spacing: 1px; }
.year-divider .year-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--accent-dim), transparent); }
.year-divider .year-count { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); background: var(--bg); padding: 2px 0; }

/* Future sections */
.future-section { margin-bottom: 20px; }
.future-section-header { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; padding: 6px 12px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 8px; }
.future-section-header .dot { width: 6px; height: 6px; border-radius: 50%; }

/* Ongoing duration bar */
.ongoing-duration { margin: 8px 0 12px; display: flex; align-items: center; gap: 8px; }
.ongoing-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.ongoing-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.ongoing-days { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); white-space: nowrap; }

/* Data modal */
.data-modal textarea { width: 100%; min-height: 300px; font-family: 'JetBrains Mono'; font-size: 11px; background: var(--bg); color: var(--crypto); border: 1px solid var(--border); border-radius: 6px; padding: 12px; resize: vertical; outline: none; }
.data-modal textarea:focus { border-color: var(--accent); }
.data-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.data-actions button { padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: 'Noto Sans SC'; transition: all .15s; }
.data-actions button:hover { border-color: var(--accent); color: var(--accent); }
.data-actions .btn-import { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.footer { text-align: center; padding: 20px 0 10px; color: var(--text-dim); font-size: 10px; font-family: 'JetBrains Mono'; }

@media (max-width: 640px) {
  .header { flex-direction: column; gap: 8px; }
  .header-actions { margin-left: 0; }
  .stats-bar { gap: 6px; }
  .stat-card { min-width: 60px; padding: 6px 10px; }
  .stat-num { font-size: 16px; }
  .future-countdown { font-size: 18px; min-width: 44px; }
}
</style>
</head>

const genId = () => Math.random().toString(36).slice(2,10);
const fmtDate = d => { if(!d) return ""; const dt=new Date(d+"T00:00:00"); return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`; };
const daysDiff = d => { const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((new Date(d+"T00:00:00")-n)/864e5); };
const trackColor = t => TRACK_META[t]?.color || "#e0e0e8";
const trackDim = t => TRACK_META[t]?.dim || "#1e1e2e";

/* localStorage helpers — with version-based cache busting */
const DATA_VERSION = "v3.0"; // bump this when SEED data changes
const KEYS = { past:"mc_past", ongoing:"mc_ongoing", future:"mc_future", version:"mc_version" };
function load(key, seed) {
  const storedVer = localStorage.getItem(KEYS.version);
  if (storedVer !== DATA_VERSION) {
    // SEED data updated — clear old cache
    localStorage.removeItem(KEYS.past);
    localStorage.removeItem(KEYS.ongoing);
    localStorage.removeItem(KEYS.future);
    localStorage.setItem(KEYS.version, DATA_VERSION);
    return seed;
  }
  try { const v=localStorage.getItem(key); if(v) return JSON.parse(v); } catch{}
  return seed;
}
function save(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e){ console.error(e); } }
function resetAllData() {
  localStorage.removeItem(KEYS.past);
  localStorage.removeItem(KEYS.ongoing);
  localStorage.removeItem(KEYS.future);
  localStorage.removeItem(KEYS.version);
  window.location.reload();
}

function EventModal({ mode, type, event, onSave, onDelete, onClose }) {
  const isOngoing = type === "ongoing";
  const [form, setForm] = useState(event || {
    title:"", date:"", track:"asia", tags:[], desc:"", importance:2,
    ...(isOngoing ? { status:"active", startDate:"", updates:[] } : {}),

  const toggleTag = t => set("tags", form.tags?.includes(t) ? form.tags.filter(x=>x!==t) : [...(form.tags||[]),t]);
  const tagOpts = TAG_OPTIONS[type] || TAG_OPTIONS.past;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{mode==="edit"?"编辑":"添加"}{type==="past"?"历史事件":type==="ongoing"?"持续追踪":"未来事件"}</h3>

        <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="事件名称" />

          {Object.entries(TRACK_META).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
        </select>
        {form.track==="crypto" && <>
          <label>关联币种</label>
          <select value={form.coin||""} onChange={e=>set("coin",e.target.value)}>
            <option value="">无</option>
            {[...CRYPTO_COINS,"热门币"].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </>}
        {isOngoing && <>
          <label>状态</label>
          <select value={form.status} onChange={e=>set("status",e.target.value)}>
            {Object.entries(STATUS_MAP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </>}
        <label>标签</label>
        <div className="modal-tags">
          {tagOpts.map(t=><button key={t} className={`modal-tag ${form.tags?.includes(t)?"sel":""}`} onClick={()=>toggleTag(t)}>{t}</button>)}

        {!isOngoing && <>
          <label>描述</label>
          <textarea value={form.desc||""} onChange={e=>set("desc",e.target.value)} placeholder="补充说明..." />

          <div className="importance-sel">
            {[1,2,3].map(i=><div key={i} className={`imp-dot ${form.importance===i?"sel":""}`} onClick={()=>set("importance",i)}>{"★".repeat(i)}</div>)}
          </div>

          {mode==="edit" && onDelete && <button style={{padding:"8px 18px",borderRadius:6,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",fontSize:13,cursor:"pointer",fontFamily:"Noto Sans SC",marginRight:"auto"}} onClick={()=>onDelete()}>🗑 删除</button>}
          <button className="btn-cancel" onClick={onClose}>取消</button>

      </div>
    </div>
  );

/* ═══════════════════════════════════════════
   SWIPE TO DELETE
   ═══════════════════════════════════════════ */
function SwipeItem({ onDelete, children }) {
  const ref = useRef(null);
  const startX = useRef(0);
  const currentX = useRef(0);
  const swiping = useRef(false);
  const opened = useRef(false);
  const moved = useRef(false);
  const THRESHOLD = 50;

  const begin = x => { startX.current = x; swiping.current = true; moved.current = false; if(ref.current) ref.current.classList.add("dragging"); };
  const move = x => {
    if(!swiping.current) return;
    const dx = x - startX.current;
    if(Math.abs(dx) > 5) moved.current = true;
    const base = opened.current ? -80 : 0;
    const val = Math.min(0, Math.max(-80, base + dx));
    currentX.current = val;
    if(ref.current) ref.current.style.transform = `translateX(${val}px)`;
  };
  const end = () => {
    swiping.current = false;
    if(ref.current) ref.current.classList.remove("dragging");
    if(currentX.current < -THRESHOLD) {
      opened.current = true;
      if(ref.current) ref.current.style.transform = "translateX(-80px)";
    } else {
      opened.current = false;
      if(ref.current) ref.current.style.transform = "translateX(0)";
    }
  };
  const close = () => { opened.current = false; currentX.current = 0; if(ref.current) ref.current.style.transform = "translateX(0)"; };

  return (
    <div className="swipe-wrapper">
      <div className="swipe-behind" onClick={()=>onDelete()}>删除</div>
      <div ref={ref} className="swipe-content"
        onTouchStart={e=>begin(e.touches[0].clientX)}
        onTouchMove={e=>move(e.touches[0].clientX)}
        onTouchEnd={end}
        onMouseDown={e=>{e.preventDefault();begin(e.clientX);}}
        onMouseMove={e=>{if(swiping.current) move(e.clientX);}}
        onMouseUp={end}
        onMouseLeave={()=>{if(swiping.current) end();}}
        onClickCapture={e=>{if(opened.current||moved.current){e.stopPropagation();if(opened.current)close();}}}>
        {children}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   DATA PANEL (export/import)
   ═══════════════════════════════════════════ */
function DataPanel({ past, ongoing, future, onImport, onMerge, onClose }) {
  const allData = JSON.stringify({ past, ongoing, future, exportedAt: new Date().toISOString() }, null, 2);
  const [importText, setImportText] = useState("");
  const [mode, setMode] = useState("export"); // export | import | copied
  const [mergeResult, setMergeResult] = useState("");

  const handleCopy = () => { navigator.clipboard.writeText(allData).catch(()=>{}); setMode("copied"); setTimeout(()=>setMode("export"),1500); };
  const handleDownload = () => {
    const blob = new Blob([allData], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`market-chronicle-${new Date().toISOString().split("T")[0]}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const parseInput = () => {
    try {
      const d = JSON.parse(importText);
      if(d.past && d.ongoing && d.future) return d;
      setMergeResult("❌ 需包含 past, ongoing, future 字段"); return null;
    } catch { setMergeResult("❌ JSON 解析失败"); return null; }
  };
  const handleOverwrite = () => { const d = parseInput(); if(d) { onImport(d); onClose(); } };
  const handleMergeClick = () => {
    const d = parseInput(); if(!d) return;
    const newPast = (d.past||[]).filter(e => !past.some(x=>x.id===e.id)).length;
    const newFuture = (d.future||[]).filter(e => !future.some(x=>x.id===e.id)).length;
    const newOngoing = (d.ongoing||[]).filter(e => !ongoing.some(x=>x.id===e.id)).length;
    const updatedOngoing = (d.ongoing||[]).filter(e => ongoing.some(x=>x.id===e.id)).length;
    onMerge(d);
    setMergeResult(`✅ 合并完成：+${newPast}条历史，+${newFuture}条未来，+${newOngoing}条新追踪，${updatedOngoing}条追踪更新`);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal data-modal" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
        <h3>📦 数据管理</h3>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <button className={`modal-tag ${mode==="export"?"sel":""}`} onClick={()=>setMode("export")}>导出</button>
          <button className={`modal-tag ${mode==="import"?"sel":""}`} onClick={()=>setMode("import")}>导入</button>
        </div>
        {mode==="export" ? <>
          <p style={{fontSize:12,color:"#6b6b80",marginBottom:8}}>复制下方 JSON 发给 Claude 即可进行数据分析，或下载备份</p>
          <textarea readOnly value={allData} />
          <div className="data-actions">
            <button onClick={handleCopy}>{mode==="copied"?"✅ 已复制":"📋 复制"}</button>
            <button onClick={handleDownload}>💾 下载 JSON</button>
            <button onClick={onClose} style={{marginLeft:"auto"}}>关闭</button>
          </div>
        </> : <>
          <p style={{fontSize:12,color:"#6b6b80",marginBottom:8}}>粘贴 Claude 输出的 JSON — 合并只追加新事件，覆盖会替换全部数据</p>
          <textarea value={importText} onChange={e=>{setImportText(e.target.value);setMergeResult("");}} placeholder='粘贴 JSON 数据...' />
          {mergeResult && <p style={{fontSize:12,color:mergeResult.startsWith("✅")?"#34d399":"#ef4444",marginTop:8}}>{mergeResult}</p>}
          <div className="data-actions">
            <button className="btn-import" onClick={handleMergeClick}>📥 合并导入（追加）</button>
            <button onClick={handleOverwrite} style={{color:"#ef4444",borderColor:"#ef4444"}}>⚠ 覆盖导入</button>
            <button onClick={onClose} style={{marginLeft:"auto"}}>关闭</button>
          </div>
        </>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState("past");
  const [tracks, setTracks] = useState({asia:true,us:true,crypto:true});
  const [past, setPast] = useState(()=>load(KEYS.past, SEED_PAST));
  const [ongoing, setOngoing] = useState(()=>load(KEYS.ongoing, SEED_ONGOING));
  const [future, setFuture] = useState(()=>load(KEYS.future, SEED_FUTURE));
  const [modal, setModal] = useState(null);
  const [dataPanel, setDataPanel] = useState(false);
  const [expanded, setExpanded] = useState({});
  const [search, setSearch] = useState("");
  const [newUpdates, setNewUpdates] = useState({});

  useEffect(()=>save(KEYS.past, past),[past]);
  useEffect(()=>save(KEYS.ongoing, ongoing),[ongoing]);
  useEffect(()=>save(KEYS.future, future),[future]);

  const toggleTrack = t => setTracks(p=>({...p,[t]:!p[t]}));

  const saveEvent = (type, ev) => {
    const setter = type==="past"?setPast : type==="ongoing"?setOngoing : setFuture;
    setter(prev => {
      const i=prev.findIndex(x=>x.id===ev.id);
      let next;
      if(i>=0){next=[...prev];next[i]=ev;} else {next=[...prev,ev];}
      // Auto-sort: past by date desc, future by date asc, ongoing by startDate desc
      if(type==="past") next.sort((a,b)=>b.date.localeCompare(a.date));
      else if(type==="future") next.sort((a,b)=>a.date.localeCompare(b.date));
      else next.sort((a,b)=>(b.startDate||"").localeCompare(a.startDate||""));
      return next;
    });
    setModal(null);
  };
  const delEvent = (type, id) => {
    const setter = type==="past"?setPast : type==="ongoing"?setOngoing : setFuture;
    setter(prev=>prev.filter(x=>x.id!==id));
  };
  const addUpdate = id => {
    const text=newUpdates[id]; if(!text) return;
    setOngoing(prev=>prev.map(o=>o.id===id?{...o,updates:[...(o.updates||[]),{date:new Date().toISOString().split("T")[0],text}]}:o));
    setNewUpdates(p=>({...p,[id]:""}));
  };
  const handleImport = d => {
    setPast((d.past||[]).sort((a,b)=>b.date.localeCompare(a.date)));
    setOngoing(d.ongoing||[]);
    setFuture((d.future||[]).sort((a,b)=>a.date.localeCompare(b.date)));
  };
  const handleMerge = d => {
    // past/future: add new ids, skip existing
    setPast(prev => {
      const ids = new Set(prev.map(e=>e.id));
      const merged = [...prev, ...(d.past||[]).filter(e=>!ids.has(e.id))];
      return merged.sort((a,b)=>b.date.localeCompare(a.date));
    });
    setFuture(prev => {
      const ids = new Set(prev.map(e=>e.id));
      const merged = [...prev, ...(d.future||[]).filter(e=>!ids.has(e.id))];
      return merged.sort((a,b)=>a.date.localeCompare(b.date));
    });
    // ongoing: merge updates for same id, add new ones
    setOngoing(prev => {
      const map = new Map(prev.map(o=>[o.id, o]));
      for (const o of (d.ongoing||[])) {
        if (map.has(o.id)) {
          const existing = map.get(o.id);
          const existDates = new Set(existing.updates?.map(u=>u.date+u.text)||[]);
          const newUpdates = (o.updates||[]).filter(u=>!existDates.has(u.date+u.text));
          map.set(o.id, {...existing, status: o.status || existing.status, updates: [...(existing.updates||[]), ...newUpdates]});
        } else {
          map.set(o.id, o);
        }
      }
      return [...map.values()];
    });
  };
  const archiveToPost = ev => { setPast(p=>[...p,{...ev,id:genId()}].sort((a,b)=>b.date.localeCompare(a.date))); setFuture(p=>p.filter(x=>x.id!==ev.id)); };

  const filtered = items => items.filter(i=>tracks[i.track]).filter(i=>!search||i.title.includes(search)||i.desc?.includes(search)||i.tags?.some(t=>t.includes(search)));
  const sortedPast = filtered(past).sort((a,b)=>b.date.localeCompare(a.date));
  const sortedFuture = filtered(future).sort((a,b)=>a.date.localeCompare(b.date));
  const filteredOngoing = filtered(ongoing);

  const allItems = [...past,...ongoing,...future];

  return (
    <div className="app">
      {/* HEADER */}
     <div className="header">
    {/* 左侧：财经日历按钮 (假设它已经在 header 内部或者你想保持它在最左) */}
    <div className="calendar-trigger">
        {/* 这里是你那个带三道杠图标的按钮 */}
    </div>

    {/* 中间：标题和副标题包裹在一起 */}
    <div className="header-title-group">
        <h1>◆ MARKET CHRONICLE</h1>
        <span className="sub">串联过去 · 追踪当下 · 展望未来</span>
    </div>

    {/* 右侧：操作按钮 */}
    <div className="header-actions">
        <button className="header-btn" onClick={() => setDataPanel(true)}>数据</button>
        <button className="header-btn" onClick={() => resetAllData()}>重置</button>
    </div>
</div>

      {/* STATS */}
      <div className="stats-bar">
        <div className="stat-card"><div className="stat-num" style={{color:"#f59e0b"}}>{past.length}</div><div className="stat-label">历史事件</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:"#fb923c"}}>{ongoing.length}</div><div className="stat-label">持续追踪</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:"#a78bfa"}}>{future.length}</div><div className="stat-label">未来事件</div></div>
        {Object.entries(TRACK_META).map(([k,v])=>(
          <div className="stat-card" key={k}><div className="stat-num" style={{color:v.color}}>{allItems.filter(i=>i.track===k).length}</div><div className="stat-label">{v.icon} {v.label}</div></div>
        ))}
      </div>

      {/* NAV */}
      <div className="nav">
        {[["past","📜 历史事件",past.length],["ongoing","🔥 持续追踪",ongoing.length],["future","🔮 未来日历",future.length]].map(([k,l,c])=>(
          <button key={k} className={`nav-btn ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{l} <span style={{fontFamily:"JetBrains Mono",fontSize:10,opacity:.6,marginLeft:4}}>{c}</span></button>
        ))}
      </div>

      {/* FILTERS */}
      <div className="track-filters">
        {Object.entries(TRACK_META).map(([k,v])=>(
          <div key={k} className={`track-chip ${tracks[k]?"":"off"}`}
            style={{borderColor:v.color, color:tracks[k]?v.color:v.dim, background:tracks[k]?v.dim:"transparent"}}
            onClick={()=>toggleTrack(k)}>{v.icon} {v.label}</div>
        ))}
        <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜索事件..." />
        <button className="add-btn" onClick={()=>setModal({mode:"add",type:tab==="past"?"past":tab==="ongoing"?"ongoing":"future"})}>
          + 添加{tab==="past"?"事件":tab==="ongoing"?"追踪":"事件"}
        </button>
      </div>

      {/* ═══ PAST TAB ═══ */}
      {tab==="past" && (
        <div className="timeline">
          {sortedPast.length===0 && <div className="empty"><div className="icon">📭</div>暂无事件，点击右上角添加</div>}
          {sortedPast.map((ev, idx) => {
            const yr = ev.date?.slice(0,4);
            const prevYr = idx>0 ? sortedPast[idx-1].date?.slice(0,4) : null;
            const showYearDivider = yr && yr !== prevYr;
            const yearCount = showYearDivider ? sortedPast.filter(e=>e.date?.startsWith(yr)).length : 0;
            return (
              <React.Fragment key={ev.id}>
                {showYearDivider && (
                  <div className="year-divider">
                    <span className="year-label">{yr}</span>
                    <span className="year-line" />
                    <span className="year-count">{yearCount}条</span>
                  </div>
                )}
                <SwipeItem onDelete={()=>delEvent("past",ev.id)}>
                  <div className="tl-item" style={{borderLeftColor:trackColor(ev.track),borderLeftWidth:3,marginBottom:0}} onClick={()=>setModal({mode:"edit",type:"past",event:ev})}>
                    <div className="tl-dot" style={{borderColor:trackColor(ev.track)}} />
                    <div className="importance-dots">
                      {Array.from({length:ev.importance||1}).map((_,i)=><span key={i} style={{background:trackColor(ev.track)}} />)}
                    </div>
                    <div className="tl-date">{fmtDate(ev.date)}</div>
                    <div className="tl-title" style={{color:trackColor(ev.track)}}>{ev.title}</div>
                    <div className="tl-meta">
                      <span className="badge" style={{background:trackDim(ev.track),color:trackColor(ev.track)}}>{TRACK_META[ev.track]?.icon} {TRACK_META[ev.track]?.label}</span>
                      {ev.coin && <span className="coin-badge">{ev.coin}</span>}
                    </div>
                    {ev.desc && <div className="tl-desc">{ev.desc}</div>}
                    <div className="tl-tags">{ev.tags?.map(t=><span key={t} className="tl-tag">{t}</span>)}</div>
                  </div>
                </SwipeItem>
              </React.Fragment>
            );
          })}
        </div>
      )}

      {/* ═══ ONGOING TAB ═══ */}
      {tab==="ongoing" && (
        <div>
          {filteredOngoing.length===0 && <div className="empty"><div className="icon">📭</div>暂无追踪，点击右上角添加</div>}
          {filteredOngoing.map(story=>{
            const isOpen=expanded[story.id];
            const st=STATUS_MAP[story.status]||STATUS_MAP.active;
            return (
              <SwipeItem key={story.id} onDelete={()=>delEvent("ongoing",story.id)}>
                <div className="ongoing-card" style={{borderLeftColor:trackColor(story.track),borderLeftWidth:3,marginBottom:0}}>
                  <div className="ongoing-header" onClick={()=>setExpanded(p=>({...p,[story.id]:!p[story.id]}))}>
                    <span className="ongoing-status" style={{background:st.color+"22",color:st.color}}>{st.label}</span>
                    <span className="badge" style={{background:trackDim(story.track),color:trackColor(story.track)}}>{TRACK_META[story.track]?.icon} {TRACK_META[story.track]?.label}</span>
                    {story.coin && <span className="coin-badge">{story.coin}</span>}
                    <span className="ongoing-title">{story.title}</span>
                    <span className="ongoing-count">{story.updates?.length||0}条</span>
                    <span className={`ongoing-chevron ${isOpen?"open":""}`}>▶</span>
                  </div>
                  {isOpen && (
                    <div className="ongoing-body">
                      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                        {story.tags?.map(t=><span key={t} className="tl-tag">{t}</span>)}
                      </div>
                      {(() => {
                        const start = new Date(story.startDate+"T00:00:00");
                        const now = new Date(); now.setHours(0,0,0,0);
                        const totalDays = Math.max(1, Math.ceil((now - start) / 864e5));
                        const barColor = st.color;
                        return (
                          <div className="ongoing-duration">
                            <span className="ongoing-days">{fmtDate(story.startDate)}</span>
                            <div className="ongoing-bar-track">
                              <div className="ongoing-bar-fill" style={{width:"100%", background:`linear-gradient(90deg, ${barColor}44, ${barColor})`}} />
                            </div>
                            <span className="ongoing-days">第{totalDays}天</span>
                          </div>
                        );
                      })()}
                      {story.updates?.map((u,i)=>(
                        <div key={i} className="ongoing-update">
                          <div className="ou-date">{fmtDate(u.date)}</div>
                          <div className="ou-text">{u.text}</div>
                        </div>
                      ))}
                      <div className="ou-add">
                        <input value={newUpdates[story.id]||""} onChange={e=>setNewUpdates(p=>({...p,[story.id]:e.target.value}))}
                          placeholder="添加新进展..." onKeyDown={e=>e.key==="Enter"&&addUpdate(story.id)} />
                        <button onClick={()=>addUpdate(story.id)}>+ 更新</button>
                      </div>
                      <div className="ongoing-footer">
                        <button className="act-btn" onClick={()=>setModal({mode:"edit",type:"ongoing",event:story})}>编辑</button>
                      </div>
                    </div>
                  )}
                </div>
              </SwipeItem>
            );
          })}
        </div>
      )}

      {/* ═══ FUTURE TAB ═══ */}
      {tab==="future" && (
        <div>
          {sortedFuture.length===0 && <div className="empty"><div className="icon">📭</div>暂无事件，点击右上角添加</div>}
          {(() => {
            const now = new Date(); now.setHours(0,0,0,0);
            const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + 7);
            const monthEnd = new Date(now); monthEnd.setDate(monthEnd.getDate() + 30);
            const overdue = sortedFuture.filter(e => new Date(e.date+"T00:00:00") < now);
            const thisWeek = sortedFuture.filter(e => { const d=new Date(e.date+"T00:00:00"); return d>=now && d<weekEnd; });
            const thisMonth = sortedFuture.filter(e => { const d=new Date(e.date+"T00:00:00"); return d>=weekEnd && d<monthEnd; });
            const later = sortedFuture.filter(e => new Date(e.date+"T00:00:00") >= monthEnd);
            const sections = [
              { label:"⚠ 已过期", items: overdue, dotColor:"#ef4444" },
              { label:"📌 本周", items: thisWeek, dotColor:"#f59e0b" },
              { label:"📅 30天内", items: thisMonth, dotColor:"#a78bfa" },
              { label:"🔭 更远", items: later, dotColor:"#6b6b80" },
            ].filter(s => s.items.length > 0);
            return sections.map(sec => (
              <div key={sec.label} className="future-section">
                <div className="future-section-header"><span className="dot" style={{background:sec.dotColor}} />{sec.label} · {sec.items.length}条</div>
                {sec.items.map(ev => {
                  const days=daysDiff(ev.date);
                  const isOverdue=days<0, isSoon=days<=3&&days>=0;
                  const countColor = isOverdue?"#ef4444":isSoon?"#f59e0b":trackColor(ev.track);
                  return (
                    <SwipeItem key={ev.id} onDelete={()=>delEvent("future",ev.id)}>
                      <div className="future-item" style={{borderLeftColor:trackColor(ev.track),borderLeftWidth:3,marginBottom:0}} onClick={()=>setModal({mode:"edit",type:"future",event:ev})}>
                        <div className="future-countdown" style={{color:countColor}}>
                          <span>{isOverdue?"已过":days===0?"今天":days}</span>
                          {!isOverdue&&days!==0&&<span className="unit">天</span>}
                        </div>
                        <div className="future-divider" />
                        <div className="future-content">
                          <div className="tl-date">{fmtDate(ev.date)}</div>
                          <div className="tl-title" style={{color:trackColor(ev.track),fontSize:14}}>{ev.title}</div>
                          <div style={{display:"flex",gap:6,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
                            <span className="badge" style={{background:trackDim(ev.track),color:trackColor(ev.track)}}>{TRACK_META[ev.track]?.icon} {TRACK_META[ev.track]?.label}</span>
                            {ev.coin && <span className="coin-badge">{ev.coin}</span>}
                            {ev.tags?.map(t=><span key={t} className="tl-tag">{t}</span>)}
                          </div>
                          {ev.desc && <div className="tl-desc" style={{marginTop:6}}>{ev.desc}</div>}
                        </div>
                      </div>
                    </SwipeItem>
                  );
                })}
              </div>
            ));
          })()}
        </div>
      )}

      {/* MODALS */}
      {modal && <EventModal mode={modal.mode} type={modal.type} event={modal.event} onSave={ev=>saveEvent(modal.type,ev)} onDelete={modal.mode==="edit" && modal.event ? ()=>{delEvent(modal.type,modal.event.id);setModal(null);} : null} onClose={()=>setModal(null)} />}
      {dataPanel && <DataPanel past={past} ongoing={ongoing} future={future} onImport={handleImport} onMerge={handleMerge} onClose={()=>setDataPanel(false)} />}

      <div className="footer">MARKET CHRONICLE {DATA_VERSION} — 贵金属+美股+亚洲科技 · 年份分组 · 时间分区</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
